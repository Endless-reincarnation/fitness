<svg width="1320" height="960" viewBox="0 0 1320 960" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- UI 视觉稿：力量感、深色、高对比、训练工具导向 -->
  <defs>
    <linearGradient id="screenBg" x1="0" y1="0" x2="390" y2="844" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101418"/>
      <stop offset="0.58" stop-color="#161B20"/>
      <stop offset="1" stop-color="#0B0F13"/>
    </linearGradient>
    <linearGradient id="greenAccent" x1="0" y1="0" x2="160" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#20F0A0"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="redAccent" x1="0" y1="0" x2="180" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF5148"/>
      <stop offset="1" stop-color="#B91C1C"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <style>
      .phone { fill: url(#screenBg); stroke: #2B343D; stroke-width: 1.5; }
      .card { fill: #1D242B; stroke: #2D3742; stroke-width: 1; }
      .card2 { fill: #11171D; stroke: #2A333C; stroke-width: 1; }
      .text { font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #F8FAFC; }
      .muted { font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #8793A1; }
      .green { fill: #20F0A0; }
      .red { fill: #FF5148; }
      .yellow { fill: #FACC15; }
      .line { stroke: #2E3A45; stroke-width: 1; }
      .chip { fill: #26313A; stroke: #33424E; stroke-width: 1; }
      .chipText { font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #B7C2CE; font-size: 18px; }
    </style>
  </defs>

  <rect width="1320" height="960" fill="#0A0D10"/>
  <text x="64" y="76" class="text" font-size="34" font-weight="800">健身计划执行助手 · 力量风 UI 方向</text>
  <text x="64" y="112" class="muted" font-size="18">核心气质：黑色训练舱 / 高对比动作数据 / 荧光绿色执行状态 / 红色力量刺激</text>

  <g transform="translate(70 148)" filter="url(#shadow)">
    <rect class="phone" width="390" height="780" rx="42"/>
    <rect x="24" y="22" width="342" height="736" rx="30" fill="#11161B"/>
    <text x="46" y="72" class="muted" font-size="16">今日训练</text>
    <text x="46" y="112" class="text" font-size="34" font-weight="900">胸肩三头</text>
    <text x="46" y="142" class="muted" font-size="16">新手三分化 · 第 1 天 · 预计 58 分钟</text>

    <rect x="46" y="174" width="298" height="130" rx="22" fill="url(#greenAccent)"/>
    <text x="68" y="214" fill="#07110D" font-family="Microsoft YaHei, Arial" font-size="18" font-weight="700">当前动作</text>
    <text x="68" y="254" fill="#03110B" font-family="Microsoft YaHei, Arial" font-size="34" font-weight="900">杠铃卧推</text>
    <text x="68" y="284" fill="#08351F" font-family="Microsoft YaHei, Arial" font-size="16">4 组 · 8-12 次 · RPE 8 · 休 150 秒</text>

    <rect x="46" y="328" width="143" height="96" rx="18" class="card"/>
    <text x="64" y="360" class="muted" font-size="15">完成进度</text>
    <text x="64" y="398" class="text" font-size="32" font-weight="900">0 / 5</text>
    <rect x="207" y="328" width="137" height="96" rx="18" class="card"/>
    <text x="225" y="360" class="muted" font-size="15">最近体重</text>
    <text x="225" y="398" class="text" font-size="32" font-weight="900">72.4</text>

    <text x="46" y="468" class="text" font-size="22" font-weight="800">动作列表</text>
    <g transform="translate(46 492)">
      <rect width="298" height="54" rx="16" class="card2"/>
      <rect x="14" y="16" width="22" height="22" rx="6" fill="#20F0A0"/>
      <text x="50" y="35" class="text" font-size="17" font-weight="700">杠铃卧推</text>
      <text x="218" y="35" class="muted" font-size="15">4 组</text>
    </g>
    <g transform="translate(46 556)">
      <rect width="298" height="54" rx="16" class="card2"/>
      <rect x="14" y="16" width="22" height="22" rx="6" fill="#FF5148"/>
      <text x="50" y="35" class="text" font-size="17" font-weight="700">哑铃上斜卧推</text>
      <text x="218" y="35" class="muted" font-size="15">3 组</text>
    </g>
    <g transform="translate(46 620)">
      <rect width="298" height="54" rx="16" class="card2"/>
      <rect x="14" y="16" width="22" height="22" rx="6" fill="#FACC15"/>
      <text x="50" y="35" class="text" font-size="17" font-weight="700">双杠臂屈伸</text>
      <text x="218" y="35" class="muted" font-size="15">3 组</text>
    </g>
    <rect x="46" y="700" width="298" height="48" rx="16" fill="url(#redAccent)"/>
    <text x="156" y="731" fill="#FFFFFF" font-family="Microsoft YaHei, Arial" font-size="18" font-weight="800">开始训练</text>
  </g>

  <g transform="translate(465 148)" filter="url(#shadow)">
    <rect class="phone" width="390" height="780" rx="42"/>
    <rect x="24" y="22" width="342" height="736" rx="30" fill="#11161B"/>
    <text x="46" y="72" class="muted" font-size="16">训练执行</text>
    <text x="46" y="112" class="text" font-size="34" font-weight="900">杠铃卧推</text>
    <text x="46" y="142" class="muted" font-size="16">主项 · 胸大肌 / 三角肌前束 / 肱三头肌</text>

    <rect x="46" y="172" width="298" height="156" rx="24" class="card"/>
    <text x="70" y="212" class="muted" font-size="16">第 2 组 / 4 组</text>
    <text x="70" y="254" class="text" font-size="42" font-weight="900">60 kg</text>
    <text x="196" y="254" class="text" font-size="42" font-weight="900">10 次</text>
    <text x="70" y="292" class="green" font-family="Microsoft YaHei, Arial" font-size="16" font-weight="700">保留 2 次余量 · RPE 8 · 150 秒休息</text>

    <rect x="46" y="352" width="92" height="74" rx="18" class="card2"/>
    <text x="72" y="382" class="muted" font-size="15">重量</text>
    <text x="68" y="410" class="text" font-size="24" font-weight="900">60</text>
    <rect x="149" y="352" width="92" height="74" rx="18" class="card2"/>
    <text x="174" y="382" class="muted" font-size="15">次数</text>
    <text x="174" y="410" class="text" font-size="24" font-weight="900">10</text>
    <rect x="252" y="352" width="92" height="74" rx="18" class="card2"/>
    <text x="282" y="382" class="muted" font-size="15">RPE</text>
    <text x="282" y="410" class="text" font-size="24" font-weight="900">8</text>

    <rect x="46" y="452" width="298" height="86" rx="20" fill="#17231F" stroke="#1F8A62"/>
    <text x="68" y="484" class="green" font-family="Microsoft YaHei, Arial" font-size="16" font-weight="800">重量规则</text>
    <text x="68" y="512" class="muted" font-size="15">能完成目标次数，保留约 2 次余量。全部达上限后下次小幅加重。</text>

    <g transform="translate(128 568)">
      <circle cx="67" cy="67" r="58" stroke="#26313A" stroke-width="14"/>
      <path d="M67 9 A58 58 0 1 1 23 104" stroke="#20F0A0" stroke-width="14" stroke-linecap="round"/>
      <text x="42" y="62" class="muted" font-size="14">休息</text>
      <text x="31" y="92" class="text" font-size="34" font-weight="900">89s</text>
    </g>

    <rect x="46" y="710" width="142" height="48" rx="16" class="chip"/>
    <text x="72" y="741" class="chipText" font-weight="700">沿用上一组</text>
    <rect x="202" y="710" width="142" height="48" rx="16" fill="url(#greenAccent)"/>
    <text x="238" y="741" fill="#03110B" font-family="Microsoft YaHei, Arial" font-size="18" font-weight="900">完成本组</text>
  </g>

  <g transform="translate(860 148)" filter="url(#shadow)">
    <rect class="phone" width="390" height="780" rx="42"/>
    <rect x="24" y="22" width="342" height="736" rx="30" fill="#11161B"/>
    <text x="46" y="72" class="muted" font-size="16">训练复盘</text>
    <text x="46" y="112" class="text" font-size="34" font-weight="900">今日表现</text>
    <text x="46" y="142" class="muted" font-size="16">胸肩三头 · 15 组 · 总容量 5,820 kg</text>

    <rect x="46" y="172" width="298" height="138" rx="24" fill="url(#redAccent)"/>
    <text x="70" y="212" fill="#FFFFFF" font-family="Microsoft YaHei, Arial" font-size="18" font-weight="700">递进建议</text>
    <text x="70" y="252" fill="#FFFFFF" font-family="Microsoft YaHei, Arial" font-size="28" font-weight="900">卧推下次 +2.5kg</text>
    <text x="70" y="282" fill="#FEE2E2" font-family="Microsoft YaHei, Arial" font-size="15">所有组达到 12 次，RPE 未超过 8。</text>

    <rect x="46" y="336" width="298" height="146" rx="22" class="card"/>
    <text x="68" y="374" class="text" font-size="22" font-weight="800">肌群刺激</text>
    <rect x="68" y="402" width="222" height="12" rx="6" fill="#26313A"/>
    <rect x="68" y="402" width="188" height="12" rx="6" fill="#20F0A0"/>
    <text x="68" y="438" class="muted" font-size="15">胸大肌</text>
    <rect x="68" y="454" width="222" height="12" rx="6" fill="#26313A"/>
    <rect x="68" y="454" width="138" height="12" rx="6" fill="#FF5148"/>
    <text x="68" y="490" class="muted" font-size="15">肱三头肌</text>

    <rect x="46" y="508" width="298" height="94" rx="20" class="card2"/>
    <text x="68" y="544" class="text" font-size="20" font-weight="800">体重趋势</text>
    <polyline points="70,582 112,570 154,574 196,552 238,548 286,530" fill="none" stroke="#20F0A0" stroke-width="5" stroke-linecap="round"/>
    <circle cx="286" cy="530" r="6" fill="#20F0A0"/>

    <rect x="46" y="628" width="298" height="56" rx="18" class="card"/>
    <text x="68" y="662" class="text" font-size="17" font-weight="700">哑铃上斜卧推：维持重量</text>
    <rect x="46" y="696" width="298" height="56" rx="18" class="card"/>
    <text x="68" y="730" class="text" font-size="17" font-weight="700">侧平举：先增加控制感</text>
  </g>
</svg>
